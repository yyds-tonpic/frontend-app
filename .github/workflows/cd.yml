name: Deploy to GitHub Page

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      #- '*.*.*'

jobs:
  bulid-prod-job:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v6
      - name: Setup Node.js version to 22.x
        uses: actions/setup-node@v6
        with: 
          node-version: '22.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci # clean install แทน npm install
      - name: Build project
        run: npm run build