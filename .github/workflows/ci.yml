name: Frontend Workshop Demo

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'chore/**' 
      - main # อย่าลืมลบ ถ้าใช้ flow ปกติ

jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: 
          node-version: '22.x'
          cache: 'npm'
      - run: node -v