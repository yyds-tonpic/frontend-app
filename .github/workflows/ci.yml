name: Frontend Workshop Demo

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'chore/**' 
      - main # อย่าลืมลบ ถ้าใช้ flow ปกติ
  pull_request:
    branches:
      - main

jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: 
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci # clean install แทน npm install
      - run: npm run lint

  build-job:
    runs-on: ubuntu-latest
    needs: lint-job
    steps:
      - name: Clone Repo
        uses: actions/checkout@v6
      - name: Setup Node.js version to 22.x
        uses: actions/setup-node@v6
        with: 
          node-version: '22.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci # clean install แทน npm install
      - name: Build project
        run: npm run build